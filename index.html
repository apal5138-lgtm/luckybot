<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI러키봇 - 행운을 서빙하는 스마트 로봇</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans KR', 'sans-serif'] },
                    colors: { brand: { 50: '#fff7ed', 500: '#f97316', 600: '#ea580c', dark: '#1e293b' } }
                }
            }
        }
    </script>

    <!-- Firebase 초기화 강화 세션 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 전역 객체 선언 (안전한 접근을 위해)
        window.LuckyBot_DB = null;
        window.LuckyBot_Auth = null;
        window.LuckyBot_Tools = { collection, addDoc, serverTimestamp, signInAnonymously };

        async function startFirebase() {
            try {
                // 설정값이 없을 경우를 대비한 방어 로직
                const config = (typeof __firebase_config !== 'undefined') ? JSON.parse(__firebase_config) : null;
                if (!config) throw new Error("Firebase Config Missing");

                const app = initializeApp(config);
                window.LuckyBot_DB = getFirestore(app);
                window.LuckyBot_Auth = getAuth(app);
                window.LuckyBot_AppId = (typeof __app_id !== 'undefined') ? __app_id : 'lucky-bot-v8';
                
                console.log("Firebase Connected Successfully");
            } catch (e) {
                console.error("Firebase Connection Error:", e);
            }
        }
        startFirebase();
    </script>

    <style>
        html { scroll-behavior: smooth; }
        .hero-bg { background: linear-gradient(180deg, #ffffff 0%, #fcfcfc 100%); }
        .input-box { @apply w-full bg-slate-50 rounded-[24px] px-8 py-5 text-base font-bold outline-none focus:ring-2 focus:ring-brand-500 transition-all border border-transparent focus:bg-white; }
    </style>
</head>
<body class="font-sans text-slate-800 bg-white">

    <header class="fixed w-full bg-white/80 backdrop-blur-lg z-[100] border-b border-slate-50 h-20 flex items-center px-6">
        <div class="max-w-6xl mx-auto w-full flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer select-none group">
                <div class="w-10 h-10 bg-brand-500 rounded-xl flex items-center justify-center shadow-lg shadow-orange-100 group-hover:rotate-6 transition-transform">
                    <i data-lucide="bot" class="text-white w-6 h-6"></i>
                </div>
                <span class="font-black text-2xl tracking-tighter text-slate-900">AI러키봇</span>
            </div>
            <a href="#contact" class="bg-slate-900 text-white px-7 py-3 rounded-full text-sm font-black hover:bg-slate-700 transition-all">상담신청</a>
        </div>
    </header>

    <section class="hero-bg pt-48 pb-20 px-6 text-center">
        <div class="max-w-4xl mx-auto space-y-6">
            <div class="inline-block px-4 py-1.5 bg-orange-50 text-brand-600 rounded-full text-[11px] font-black tracking-widest mb-4">SMART SERVING SOLUTION</div>
            <h1 class="text-6xl md:text-7xl font-black leading-tight tracking-tighter text-slate-900">가장 완벽한 서빙,<br><span class="text-brand-500">러키봇</span>과 함께</h1>
            <p class="text-slate-400 text-xl font-medium">매장의 효율을 높여주는 스마트한 파트너</p>
        </div>
    </section>

    <section id="contact" class="py-24 px-6 bg-slate-50/50">
        <div class="max-w-lg mx-auto bg-white p-12 rounded-[56px] shadow-2xl border border-slate-100">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-black mb-3 text-slate-900">무료 상담</h2>
                <p class="text-slate-400 font-bold">정보를 남겨주시면 전문가가 연락드립니다.</p>
            </div>
            <form id="consult-form" onsubmit="return false;" class="space-y-6">
                <div>
                    <label class="block text-[11px] font-black text-slate-400 ml-6 mb-2 uppercase tracking-widest">매장명 또는 성함</label>
                    <input type="text" id="user-name" placeholder="성함을 입력하세요" class="input-box" required>
                </div>
                <div>
                    <label class="block text-[11px] font-black text-slate-400 ml-6 mb-2 uppercase tracking-widest">연락처</label>
                    <input type="tel" id="user-phone" placeholder="010-0000-0000" class="input-box" required>
                </div>
                <button type="button" id="submit-btn" class="w-full bg-brand-500 text-white py-6 rounded-[32px] font-black text-xl shadow-xl shadow-orange-200 hover:bg-brand-600 active:scale-95 transition-all mt-4">신청하기</button>
            </form>
        </div>
    </section>

    <footer class="py-16 text-center text-slate-300 text-[11px] font-black uppercase tracking-[0.4em]">
        &copy; 2026 AI LUCKY BOT. ALL RIGHTS RESERVED.
    </footer>

    <script>
        lucide.createIcons();

        document.getElementById('submit-btn').addEventListener('click', async function() {
            const name = document.getElementById('user-name').value.trim();
            const phone = document.getElementById('user-phone').value.trim();
            const btn = this;

            if (!name || !phone) {
                alert('정보를 모두 입력해주세요.');
                return;
            }

            btn.disabled = true;
            btn.innerText = "전송 중...";

            try {
                // 초기화가 늦어질 경우를 대비해 1초 대기 후 시도
                if (!window.LuckyBot_DB) {
                    await new Promise(r => setTimeout(r, 1000));
                }

                if (!window.LuckyBot_DB) throw new Error("서버 응답 지연 (다시 시도해주세요)");

                const { db, auth, appId, collection, addDoc, serverTimestamp, signInAnonymously } = {
                    db: window.LuckyBot_DB,
                    auth: window.LuckyBot_Auth,
                    appId: window.LuckyBot_AppId,
                    ...window.LuckyBot_Tools
                };

                // 인증 확인 및 재인증
                if (!auth.currentUser) {
                    await signInAnonymously(auth);
                }

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'consultations'), {
                    name, phone, createdAt: serverTimestamp()
                });

                alert('✅ 신청이 완료되었습니다! 확인 후 연락드리겠습니다.');
                document.getElementById('consult-form').reset();

            } catch (err) {
                console.error(err);
                alert('⚠️ 오류가 발생했습니다: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "신청하기";
            }
        });
    </script>
</body>
</html>
