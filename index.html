<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI러키봇 - 행운을 서빙하는 스마트 로봇</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans KR', 'sans-serif'] },
                    colors: { brand: { 500: '#f97316', 600: '#ea580c' } }
                }
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 초기 설정값 로드
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = __app_id;

        // 전역 함수로 등록
        window.submitConsultation = async (name, phone) => {
            if (!auth.currentUser) await signInAnonymously(auth);
            return await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'consultations'), {
                name, phone, createdAt: serverTimestamp()
            });
        };
    </script>
</head>
<body class="font-sans text-slate-800 bg-white">

    <!-- 헤더 -->
    <header class="fixed w-full bg-white/90 backdrop-blur-sm z-50 border-b h-20 flex items-center px-6">
        <div class="max-w-6xl mx-auto w-full flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-brand-500 rounded-lg flex items-center justify-center shadow-lg">
                    <i data-lucide="bot" class="text-white"></i>
                </div>
                <span class="font-black text-xl tracking-tighter">AI러키봇</span>
            </div>
            <a href="#contact" class="bg-slate-900 text-white px-5 py-2.5 rounded-full text-sm font-bold">상담신청</a>
        </div>
    </header>

    <!-- 메인 비주얼 -->
    <section class="pt-48 pb-20 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-black leading-tight tracking-tighter mb-6">
            가장 완벽한 서빙,<br><span class="text-brand-500">러키봇</span>과 함께
        </h1>
        <p class="text-slate-500 text-lg md:text-xl font-medium">매장의 효율을 극대화하는 스마트 서빙 솔루션</p>
    </section>

    <!-- 가격/상품 섹션 -->
    <section class="py-20 px-6 bg-slate-50">
        <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-8">
            <div class="bg-white p-10 rounded-[40px] shadow-sm border">
                <span class="text-brand-500 font-bold text-sm uppercase tracking-widest">리퍼비시</span>
                <h3 class="text-3xl font-black mt-2 mb-4">러키봇 실속형</h3>
                <p class="text-4xl font-black text-brand-500 mb-6">299,000<span class="text-base text-slate-400 font-normal ml-1">원/월</span></p>
                <ul class="space-y-3 text-slate-600 font-medium">
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-5 h-5 text-brand-500"></i> 전문가 정밀 검수 완료</li>
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-5 h-5 text-brand-500"></i> 신품급 외관 및 성능 보장</li>
                </ul>
            </div>
            <div class="bg-slate-900 p-10 rounded-[40px] shadow-xl text-white">
                <span class="text-brand-500 font-bold text-sm uppercase tracking-widest">신제품</span>
                <h3 class="text-3xl font-black mt-2 mb-4">러키봇 신품</h3>
                <p class="text-4xl font-black text-brand-500 mb-6">399,000<span class="text-base text-slate-400 font-normal ml-1">원/월</span></p>
                <ul class="space-y-3 text-slate-300 font-medium">
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-5 h-5 text-brand-500"></i> 최신형 3D LiDAR 탑재</li>
                    <li class="flex items-center gap-2"><i data-lucide="check" class="w-5 h-5 text-brand-500"></i> 대용량 배터리 시스템</li>
                </ul>
            </div>
        </div>
    </section>

    <!-- 상담 폼 -->
    <section id="contact" class="py-24 px-6">
        <div class="max-w-lg mx-auto bg-white p-10 rounded-[40px] shadow-2xl border text-center">
            <h2 class="text-3xl font-black mb-2">무료 상담</h2>
            <p class="text-slate-400 mb-8 font-medium">정보를 남겨주시면 빠르게 연락드리겠습니다.</p>
            <div class="space-y-4">
                <input type="text" id="name" placeholder="성함 또는 매장명" class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-brand-500 font-bold">
                <input type="tel" id="phone" placeholder="연락처 (예: 01012345678)" class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-brand-500 font-bold">
                <button onclick="handleFormSubmit()" id="submit-btn" class="w-full bg-brand-500 text-white py-5 rounded-2xl font-black text-lg shadow-lg hover:bg-brand-600 transition-all">신청하기</button>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center text-slate-300 text-xs font-bold tracking-widest">
        &copy; 2026 AI LUCKY BOT. ALL RIGHTS RESERVED.
    </footer>

    <script>
        lucide.createIcons();

        async function handleFormSubmit() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const btn = document.getElementById('submit-btn');

            if (!name || !phone) {
                alert('모든 항목을 입력해주세요.');
                return;
            }

            btn.disabled = true;
            btn.innerText = "전송 중...";

            try {
                await window.submitConsultation(name, phone);
                alert('신청이 완료되었습니다!');
                document.getElementById('name').value = "";
                document.getElementById('phone').value = "";
            } catch (e) {
                alert('오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "신청하기";
            }
        }
    </script>
</body>
</html>
