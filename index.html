<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI러키봇 - 행운을 서빙하는 스마트 로봇</title>
    
    <!-- 라이브러리: Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans KR', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#fff7ed',   
                            500: '#f97316',
                            600: '#ea580c',
                            dark: '#1e293b'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Firebase 실시간 데이터베이스 설정 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lucky-bot-final';

        // 전역 객체에 할당 (접근성 보장)
        window.firebase = { db, auth, appId, collection, addDoc, onSnapshot, serverTimestamp };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("인증 실패:", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("인증 완료:", user.uid);
                setupRealtimeListener();
            } else {
                initAuth();
            }
        });

        function setupRealtimeListener() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'consultations');
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('admin-list');
                const badge = document.getElementById('submission-count');
                const docs = [];
                snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
                
                docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                
                badge.innerText = docs.length;
                list.innerHTML = docs.map(doc => `
                    <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-white hover:bg-orange-50 transition-colors">
                        <div class="text-left">
                            <p class="font-bold text-slate-800 text-sm">${doc.name || '미입력'}</p>
                            <p class="text-xs text-brand-500 font-mono">${doc.phone || '미입력'}</p>
                        </div>
                        <p class="text-[10px] text-slate-400">
                            ${doc.createdAt ? new Date(doc.createdAt.seconds * 1000).toLocaleTimeString() : '방금'}
                        </p>
                    </div>
                `).join('') || '<p class="p-10 text-center text-slate-400 text-xs italic">접수된 내역이 없습니다.</p>';
            }, (err) => console.error("Firestore Error:", err));
        }

        initAuth();
    </script>

    <style>
        html { scroll-behavior: smooth; }
        .hero-bg { background: linear-gradient(180deg, #FFF9F3 0%, #FFFFFF 100%); }
        #admin-panel { display: none; position: fixed; bottom: 20px; right: 20px; width: 320px; z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        #admin-panel.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="font-sans text-slate-800 bg-white">

    <!-- 네비게이션 -->
    <header class="fixed w-full bg-white/80 backdrop-blur-md z-50 border-b border-slate-100 h-16 flex items-center px-6">
        <div class="max-w-6xl mx-auto w-full flex justify-between items-center">
            <!-- 비밀 클릭 영역: 로고를 3번 클릭하세요 -->
            <div class="flex items-center gap-2 cursor-pointer select-none" onclick="secretClick()">
                <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center shadow-lg">
                    <i data-lucide="bot" class="text-white w-5 h-5"></i>
                </div>
                <span id="logo-text" class="font-black text-xl tracking-tighter text-slate-900">AI러키봇</span>
            </div>
            <a href="#contact" class="bg-brand-dark text-white px-5 py-2 rounded-full text-xs font-black shadow-lg hover:bg-slate-700 transition-all">상담신청</a>
        </div>
    </header>

    <!-- 메인 비주얼 -->
    <section class="hero-bg pt-32 pb-20 px-6 text-center">
        <div class="max-w-3xl mx-auto space-y-6">
            <h1 class="text-4xl md:text-6xl font-black leading-tight text-slate-900">
                행운을 서빙하는<br><span class="text-brand-500">AI러키봇</span>
            </h1>
            <p class="text-slate-500 text-lg">최첨단 인공지능 서빙 로봇을 지금 만나보세요.</p>
        </div>
    </section>

    <!-- 요금 안내 -->
    <section id="models" class="py-16 px-6">
        <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-6">
            <div class="bg-slate-50 p-8 rounded-[32px] border border-slate-100">
                <p class="text-xs font-bold text-slate-400 mb-2">실속형 리퍼비시</p>
                <h3 class="text-2xl font-black mb-4">러키봇 리퍼</h3>
                <p class="text-3xl font-black text-brand-500 mb-6">월 299,000원</p>
                <ul class="text-sm space-y-2 text-slate-600 font-medium">
                    <li>• 정밀 점검 완료된 A급 로봇</li>
                    <li>• 신품과 동일한 무상 AS 지원</li>
                </ul>
            </div>
            <div class="bg-brand-500 p-8 rounded-[32px] text-white shadow-xl">
                <p class="text-xs font-bold opacity-80 mb-2">가장 많이 찾는 모델</p>
                <h3 class="text-2xl font-black mb-4">러키봇 신품</h3>
                <p class="text-3xl font-black mb-6">월 399,000원</p>
                <ul class="text-sm space-y-2 opacity-90 font-medium">
                    <li>• 최신형 AI 센서 탑재</li>
                    <li>• 대용량 배터리로 12시간 연속 주행</li>
                </ul>
            </div>
        </div>
    </section>

    <!-- 상담 신청 폼 -->
    <section id="contact" class="py-20 px-6 bg-slate-50">
        <div class="max-w-md mx-auto bg-white p-8 rounded-[40px] shadow-xl">
            <h2 class="text-2xl font-black text-center mb-8">무료 체험 신청</h2>
            <form id="consultation-form" class="space-y-4">
                <input type="text" id="user-name" placeholder="매장명 또는 성함" class="w-full bg-slate-50 rounded-2xl px-5 py-4 text-sm font-bold focus:ring-2 focus:ring-brand-500 outline-none transition-all" required>
                <input type="tel" id="user-phone" placeholder="연락처 (010-0000-0000)" class="w-full bg-slate-50 rounded-2xl px-5 py-4 text-sm font-bold focus:ring-2 focus:ring-brand-500 outline-none transition-all" required>
                <button type="submit" id="submit-btn" class="w-full bg-brand-500 text-white py-5 rounded-2xl font-black text-lg shadow-lg hover:bg-brand-600 transition-all">신청하기</button>
            </form>
        </div>
    </section>

    <!-- 관리자 패널 (기본 숨김) -->
    <div id="admin-panel" class="bg-white rounded-3xl overflow-hidden border border-slate-200 shadow-2xl">
        <div class="bg-slate-900 p-4 flex justify-between items-center text-white">
            <span class="font-bold text-xs uppercase tracking-wider">신규 상담 <span id="submission-count" class="ml-1 text-brand-500">0</span>건</span>
            <button onclick="toggleAdmin()" class="hover:text-brand-500"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>
        <div id="admin-list" class="max-h-[350px] overflow-y-auto bg-white">
            <p class="p-10 text-center text-slate-400 text-xs italic text-left">데이터 로드 중...</p>
        </div>
    </div>

    <footer class="py-10 text-center text-slate-300 text-[10px] font-bold uppercase tracking-widest">
        &copy; 2026 AI Lucky Bot Inc.
    </footer>

    <script>
        lucide.createIcons();
        
        let count = 0;
        let timer;
        function secretClick() {
            count++;
            clearTimeout(timer);
            if (count >= 3) {
                toggleAdmin();
                count = 0;
            } else {
                timer = setTimeout(() => { count = 0; }, 600);
            }
        }

        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            p.classList.toggle('active');
        }

        document.getElementById('consultation-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;

            btn.disabled = true;
            btn.innerText = "전송 중...";

            try {
                const { db, appId, collection, addDoc, serverTimestamp } = window.firebase;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'consultations'), {
                    name: name,
                    phone: phone,
                    createdAt: serverTimestamp()
                });
                
                // 확실한 피드백을 위해 브라우저 기본 알림창 사용
                alert('✅ 상담 신청이 정상적으로 완료되었습니다!\n담당자가 곧 연락드리겠습니다.');
                document.getElementById('consultation-form').reset();
            } catch (err) {
                console.error(err);
                alert('❌ 전송에 실패했습니다. 다시 시도해주세요.');
            } finally {
                btn.disabled = false;
                btn.innerText = "신청하기";
            }
        });
    </script>
</body>
</html>
